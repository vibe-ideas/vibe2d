name: CI

# Two-layer test policy:
#   * `test` job — fast unit + lib + bin tests on Linux/macOS. Skips
#     `#[ignore]`-gated VDP integration tests by default.
#   * `vdp-integration` job — runs the ignored VDP tests for ui-demo
#     under Xvfb + lavapipe (software Vulkan). Catches VDP/UI regressions
#     in CI that would otherwise only fire on a dev box with a real GPU.
# Run the same ignored tests locally via:
#   cargo test -p <game> -- --ignored --test-threads=1
# (See AGENTS.md → "测试与验证" for the full policy.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Unit tests (the main gate) ────────────────────────────────
  # `cargo test --workspace` runs every crate's `#[cfg(test)]` modules.
  # Integration tests tagged `#[ignore]` (e.g. examples/ui/tests/vdp_ui.rs)
  # are skipped automatically — that's the contract we want.
  test:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      # Linux needs ALSA headers for vibe_audio (rodio → cpal → alsa-sys).
      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Run unit tests
        # --workspace: every crate in the workspace
        # --lib --bins --tests: build all test harnesses but
        #   `#[ignore]`-gated tests (VDP integration) stay skipped by default
        #
        # Note: we deliberately do NOT pass --locked. Vibe2D is a library
        # project (game engine + companion crates), so per Cargo's guidance
        # we don't commit Cargo.lock. CI therefore resolves deps fresh on
        # every run, which is the intended behavior for libraries.
        run: cargo test --workspace --lib --bins --tests

  # ── Format check ──────────────────────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Clippy (lints) ────────────────────────────────────────────
  # Scoped to the engine crates only. Example games under `examples/*` are
  # illustrative code — they're held to compile-cleanly + format standards,
  # but we don't enforce full clippy strictness on them because game demos
  # often keep deliberately-unused variants, magic numbers, etc. as
  # placeholders. Engine crates are the product; those do get -D warnings.
  clippy:
    name: clippy (engine crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux audio deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
      - name: Clippy on engine crates + cli
        # See the `test` job for why we don't pass --locked.
        run: |
          cargo clippy \
            -p vibe2d \
            -p vibe_render \
            -p vibe_platform \
            -p vibe_input \
            -p vibe_asset \
            -p vibe_audio \
            -p vibe_debug \
            -p vibe_ui \
            -p vibe_physics \
            -p vibe_test \
            -p vibe-cli \
            --all-targets -- -D warnings

  # ── VDP integration tests under Xvfb + lavapipe ──────────────
  # Runs the `#[ignore]`-gated tests in examples/ui/tests/. They each
  # spawn a real game child process, so we need:
  #   * Xvfb — virtual X display (GitHub runners have no real display)
  #   * mesa-vulkan-drivers — lavapipe (software Vulkan), so wgpu has
  #     an adapter to talk to
  #   * VIBE_HEADLESS=1 (via the harness `visible: false` default) so
  #     winit creates the window invisibly
  #   * VIBE_TEST_RELEASE=1 — spawn child games with `--release`
  #     because lavapipe is too slow under debug for the harness'
  #     180 s readiness timeout
  # Scope: ui-demo only for now. Add more `-p` entries once this job
  # is proven stable. Tests run with --test-threads=1 to avoid the
  # spawned games racing on VDP port 9229.
  vdp-integration:
    name: VDP integration (ui-demo, Xvfb + lavapipe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install audio + display + Vulkan deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            xvfb \
            mesa-vulkan-drivers \
            vulkan-tools
      - name: Verify lavapipe is available
        run: xvfb-run -a vulkaninfo --summary | grep -i llvmpipe
      - name: Run ignored ui-demo VDP tests under Xvfb
        env:
          WGPU_BACKEND: vulkan
          RUST_LOG: warn
          # Spawn child games as `cargo run --release`; lavapipe is too
          # slow under debug to hit the 180 s readiness timeout.
          VIBE_TEST_RELEASE: "1"
          # Under Xvfb an unmapped (VIBE_HEADLESS) window breaks lavapipe
          # surface init. Force visible — Xvfb is already a virtual display
          # so "visible" only means "mapped in the X server", not on-screen.
          VIBE_TEST_FORCE_VISIBLE: "1"
          # Capture child stdout/stderr so a hung game leaves a panic /
          # log trail behind, dumped by the post-step on failure below.
          VIBE_TEST_CHILD_LOG_DIR: ${{ runner.temp }}/child-logs
        run: |
          xvfb-run -a cargo test -p ui-demo --release \
            -- --ignored --test-threads=1
      - name: Dump child game logs on failure
        if: failure()
        run: |
          dir="${{ runner.temp }}/child-logs"
          if [ -d "$dir" ]; then
            for f in "$dir"/*.log; do
              echo "::group::$(basename "$f")"
              cat "$f"
              echo "::endgroup::"
            done
          else
            echo "No child log dir at $dir"
          fi

  # ── Release build without VDP ────────────────────────────────
  # Confirms the `--no-default-features` path (VDP stripped) still compiles.
  # AGENTS.md mandates testing this whenever feature gating changes,
  # and running it on every push catches regressions cheaply.
  no-default-features:
    name: Build without VDP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux audio deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
      # See the `test` job for why we don't pass --locked.
      - run: cargo build --workspace --no-default-features
