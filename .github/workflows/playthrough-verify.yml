name: Playthrough Verify (sandbox)

# Temporary sibling of `playthrough.yml`, kept around only while
# iterating on the recording recipe. Triggers on `push` so changes
# to the recording recipe take effect immediately (unlike
# `pull_request_target` which reads YAML from the default branch).
#
# Recording approach: bypass x11grab entirely. wgpu/lavapipe under
# Xvfb renders correctly but the X11 display path comes out black —
# proven by VDP game.screenshot returning YAVG=102 (normal bright
# content) while x11grab on the same display gives YAVG=16 (Xvfb
# default gray). So we use VDP's wgpu-readback screenshot path as
# the recorder and assemble the PNGs with ffmpeg afterwards.

on:
  push:
    branches:
      - 'fix/playthrough-**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  record:
    name: Record ${{ matrix.game.pkg }} (verify)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # No `width`/`height` here anymore — the VDP screenshot path
        # uses the game's actual swapchain size, so ffmpeg picks it
        # up from the PNG headers automatically.
        game:
          - { pkg: aoi-demo }
          - { pkg: flappy-bird }
          - { pkg: mari0 }
          - { pkg: tetris }
          - { pkg: ui-demo }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: playthrough-verify-${{ matrix.game.pkg }}

      - name: Install audio + display + Vulkan + assembly deps
        # Xvfb still required because winit's X11 backend needs an X
        # connection to start. But no fluxbox/x11-utils/imagemagick —
        # we don't depend on the X11 display path for capture
        # anymore. ffmpeg is just the GIF assembler from PNGs.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libxkbcommon-x11-0 \
            xvfb \
            mesa-vulkan-drivers \
            vulkan-tools \
            ffmpeg

      - name: Start Xvfb
        run: |
          # Generous screen so different games' window sizes all fit
          # if winit ever decides to position the window non-trivially.
          Xvfb :99 -screen 0 1440x960x24 \
            +extension RANDR +extension GLX +extension COMPOSITE \
            -noreset -ac &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          sleep 1

      - name: Run playthrough scenario (with VDP-screenshot recorder)
        env:
          WGPU_BACKEND: vulkan
          RUST_LOG: warn
          VIBE_TEST_RELEASE: "1"
          VIBE_TEST_FORCE_VISIBLE: "1"
          VIBE_TEST_CHILD_LOG_DIR: ${{ runner.temp }}/child-logs
          # The harness picks this up in `start_recorder(...)` and
          # spawns a background task that polls game.screenshot at
          # 15 fps writing PNGs to ${VIBE_TEST_RECORDING_DIR}/<pkg>/.
          VIBE_TEST_RECORDING_DIR: /tmp/recording
        run: |
          mkdir -p /tmp/recording
          cargo test -p ${{ matrix.game.pkg }} --release \
            --test playthrough -- --ignored --nocapture

      - name: Collect child game logs (always)
        if: always()
        run: |
          dir="${{ runner.temp }}/child-logs"
          mkdir -p /tmp/diag
          if [ -d "$dir" ]; then
            cp "$dir"/*.log /tmp/diag/ 2>/dev/null || true
          fi

      - name: Assemble PNGs into GIF
        if: always()
        env:
          PKG: ${{ matrix.game.pkg }}
        run: |
          dir="/tmp/recording/${PKG}"
          if [ ! -d "$dir" ] || [ -z "$(ls -A "$dir" 2>/dev/null)" ]; then
            echo "No PNGs in $dir — skipping GIF assembly."
            exit 0
          fi
          # Match the recorder's 15 fps so playback timing matches reality.
          # palettegen/paletteuse for decent color count.
          ffmpeg -y -framerate 15 -i "$dir/%04d.png" \
            -vf "scale=720:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=128[p];[s1][p]paletteuse=dither=bayer:bayer_scale=5" \
            /tmp/play.gif
          ls -la /tmp/play.gif

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verify-${{ matrix.game.pkg }}
          path: |
            /tmp/play.gif
            /tmp/recording/${{ matrix.game.pkg }}/
            /tmp/diag/
          retention-days: 7
          if-no-files-found: warn
