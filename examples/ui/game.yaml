meta:
  name: "UI Demo"
  version: "0.1.0"

window:
  width: 1024
  height: 640
  title: "UI Demo - Vibe2D"
  vsync: true

virtual_resolution:
  width: 512
  height: 320

assets:
  fonts:
    title: "assets/fonts/ui.ttf:20"
    body: "assets/fonts/ui.ttf:14"
    small: "assets/fonts/ui.ttf:10"
    # CJK font for the IME / Chinese input demo (lazy-rasterized atlas).
    # Source Han Sans SC is open-source under the SIL Open Font License.
    cjk: "assets/fonts/SourceHanSansSC-Regular.otf:14"

input:
  actions:
    confirm:
      keys: ["Enter"]

debug:
  vdp:
    enabled: true
    # Non-standard port so parallel flappy-bird/tetris tests don't collide.
    port: 9230
